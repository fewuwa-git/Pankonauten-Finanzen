name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: zeus01.de
          username: l3s15
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            cd /html/finanzen.pankonauten.de
            git pull origin main
            npm ci --omit=dev
            npm run build
            pm2 restart pankonauten-finanzen || pm2 start npm --name "pankonauten-finanzen" -- start
